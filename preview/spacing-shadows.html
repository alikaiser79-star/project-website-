<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #EDE6D6; padding: 24px 28px; font-family: 'DM Sans', sans-serif; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.box { background: white; border-radius: 4px; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
.label { font-size: 10px; font-weight: 500; color: #7A7870; letter-spacing: 0.08em; text-transform: uppercase; }
.name { font-size: 13px; font-weight: 500; color: #1A1A18; }
.val { font-size: 10px; color: #7A7870; font-family: 'DM Mono', monospace; margin-top: auto; }
</style></head>
<body>
<div class="grid">
  <div class="box" style="box-shadow:0 2px 12px rgba(26,26,24,0.07)">
    <div class="label">Card</div>
    <div class="name">Lift</div>
    <div class="val">0 2px 12px rgba(26,26,24,.07)</div>
  </div>
  <div class="box" style="box-shadow:0 4px 20px rgba(26,26,24,0.12)">
    <div class="label">Hover</div>
    <div class="name">Raised</div>
    <div class="val">0 4px 20px rgba(26,26,24,.12)</div>
  </div>
  <div class="box" style="box-shadow:0 8px 32px rgba(26,26,24,0.14)">
    <div class="label">Modal / Dropdown</div>
    <div class="name">Elevated</div>
    <div class="val">0 8px 32px rgba(26,26,24,.14)</div>
  </div>
</div>
</body></html>
