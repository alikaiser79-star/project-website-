<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F5F0E8; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.swatch { border-radius: 4px; overflow: hidden; }
.color-block { height: 72px; }
.info { padding: 8px 10px 10px; background: #fff; }
.name { font-size: 11px; font-weight: 500; color: #1A1A18; }
.token { font-size: 10px; color: #7A7870; font-family: monospace; margin-top: 2px; }
.hex { font-size: 10px; color: #7A7870; }
</style></head>
<body>
<div class="grid">
  <div class="swatch"><div class="color-block" style="background:#C4714A"></div><div class="info"><div class="name">Terracotta</div><div class="token">--color-terracotta</div><div class="hex">#C4714A</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#A85D39"></div><div class="info"><div class="name">Terra Dark</div><div class="token">--color-terra-dark</div><div class="hex">#A85D39</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#6B4E35"></div><div class="info"><div class="name">Soil</div><div class="token">--color-soil</div><div class="hex">#6B4E35</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#B8973A"></div><div class="info"><div class="name">Gold</div><div class="token">--color-gold</div><div class="hex">#B8973A</div></div></div>
</div>
</body></html>
