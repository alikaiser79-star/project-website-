<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F5F0E8; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.swatch { border-radius: 4px; overflow: hidden; }
.color-block { height: 64px; }
.info { padding: 8px 10px 10px; background: #fff; }
.name { font-size: 11px; font-weight: 500; color: #1A1A18; }
.token { font-size: 10px; color: #7A7870; font-family: 'DM Mono', monospace; margin-top: 2px; }
.hex { font-size: 10px; color: #7A7870; }
</style></head>
<body>
<div class="grid">
  <div class="swatch"><div class="color-block" style="background:#1C3829"></div><div class="info"><div class="name">Forest</div><div class="token">--color-forest</div><div class="hex">#1C3829</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#2E5339"></div><div class="info"><div class="name">Moss</div><div class="token">--color-moss</div><div class="hex">#2E5339</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#7A9E87"></div><div class="info"><div class="name">Sage</div><div class="token">--color-sage</div><div class="hex">#7A9E87</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#B4CCBA"></div><div class="info"><div class="name">Sage Light</div><div class="token">--color-sage-light</div><div class="hex">#B4CCBA</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#A8C5A0"></div><div class="info"><div class="name">Fern</div><div class="token">--color-fern</div><div class="hex">#A8C5A0</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#142A1F"></div><div class="info"><div class="name">Forest Dark</div><div class="token">--color-forest-dark</div><div class="hex">#142A1F</div></div></div>
</div>
</body></html>
