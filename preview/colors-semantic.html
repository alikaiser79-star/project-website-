<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F5F0E8; padding: 20px; }
.section { margin-bottom: 16px; }
.section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #7A7870; margin-bottom: 8px; }
.row { display: flex; gap: 8px; }
.chip { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 4px; border: 1px solid #E2D9C5; background: white; flex: 1; }
.dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.label { font-size: 11px; font-weight: 500; color: #1A1A18; }
.token { font-size: 10px; color: #7A7870; margin-left: auto; }
</style></head>
<body>
<div class="section">
  <div class="section-label">Backgrounds</div>
  <div class="row">
    <div class="chip"><div class="dot" style="background:#F5F0E8;border:1px solid #ccc"></div><div class="label">Default</div><div class="token">--bg-default</div></div>
    <div class="chip"><div class="dot" style="background:#EDE6D6;border:1px solid #ccc"></div><div class="label">Subtle</div><div class="token">--bg-subtle</div></div>
    <div class="chip"><div class="dot" style="background:#1C3829"></div><div class="label">Inverse</div><div class="token">--bg-inverse</div></div>
    <div class="chip"><div class="dot" style="background:#C4714A"></div><div class="label">Accent</div><div class="token">--bg-accent</div></div>
  </div>
</div>
<div class="section">
  <div class="section-label">Text</div>
  <div class="row">
    <div class="chip"><div class="dot" style="background:#1A1A18"></div><div class="label">Primary</div><div class="token">--text-primary</div></div>
    <div class="chip"><div class="dot" style="background:#2C2C28"></div><div class="label">Secondary</div><div class="token">--text-secondary</div></div>
    <div class="chip"><div class="dot" style="background:#7A7870"></div><div class="label">Muted</div><div class="token">--text-muted</div></div>
    <div class="chip"><div class="dot" style="background:#1C3829"></div><div class="label">Brand</div><div class="token">--text-brand</div></div>
  </div>
</div>
</body></html>
