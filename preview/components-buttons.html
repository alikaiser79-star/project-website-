<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F5F0E8; padding: 24px 28px; font-family: 'DM Sans', sans-serif; }
.row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #7A7870; width: 80px; flex-shrink: 0; }
/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 8px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; border-radius: 4px; transition: all 200ms cubic-bezier(0.25,0.46,0.45,0.94); }
.btn-primary { background: #1C3829; color: #F5F0E8; padding: 10px 22px; font-size: 14px; }
.btn-primary:hover { background: #2E5339; }
.btn-secondary { background: transparent; color: #1C3829; padding: 10px 22px; font-size: 14px; border: 1px solid #1C3829; }
.btn-secondary:hover { background: #1C3829; color: #F5F0E8; }
.btn-accent { background: #C4714A; color: #fff; padding: 10px 22px; font-size: 14px; }
.btn-accent:hover { background: #A85D39; }
.btn-ghost { background: transparent; color: #2C2C28; padding: 10px 22px; font-size: 14px; border: 1px solid #D8D0C0; }
.btn-ghost:hover { border-color: #1C3829; color: #1C3829; }
/* Sizes */
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-lg { padding: 14px 30px; font-size: 16px; }
</style></head>
<body>
  <div class="row"><div class="label">Primary</div>
    <button class="btn btn-primary">Visit The Farm</button>
    <button class="btn btn-primary btn-sm">View Harvest</button>
    <button class="btn btn-primary btn-lg">Order Now</button>
  </div>
  <div class="row"><div class="label">Secondary</div>
    <button class="btn btn-secondary">Our Story</button>
    <button class="btn btn-secondary btn-sm">Learn More</button>
  </div>
  <div class="row"><div class="label">Accent</div>
    <button class="btn btn-accent">Shop Fresh</button>
    <button class="btn btn-accent btn-sm">Add to Order</button>
  </div>
  <div class="row"><div class="label">Ghost</div>
    <button class="btn btn-ghost">Watch Film</button>
    <button class="btn btn-ghost btn-sm">See All</button>
  </div>
</body></html>
