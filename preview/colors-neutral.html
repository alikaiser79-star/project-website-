<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F5F0E8; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.swatch { border-radius: 4px; overflow: hidden; border: 1px solid #E2D9C5; }
.color-block { height: 64px; }
.info { padding: 8px 10px 10px; background: #fff; }
.name { font-size: 11px; font-weight: 500; color: #1A1A18; }
.token { font-size: 10px; color: #7A7870; font-family: monospace; margin-top: 2px; }
.hex { font-size: 10px; color: #7A7870; }
</style></head>
<body>
<div class="grid">
  <div class="swatch"><div class="color-block" style="background:#F5F0E8"></div><div class="info"><div class="name">Cream</div><div class="token">--color-cream</div><div class="hex">#F5F0E8</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#EDE6D6"></div><div class="info"><div class="name">Parchment</div><div class="token">--color-parchment</div><div class="hex">#EDE6D6</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#E2D9C5"></div><div class="info"><div class="name">Linen</div><div class="token">--color-linen</div><div class="hex">#E2D9C5</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#7A7870"></div><div class="info"><div class="name">Stone</div><div class="token">--color-stone</div><div class="hex">#7A7870</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#2C2C28"></div><div class="info"><div class="name">Ink</div><div class="token">--color-ink</div><div class="hex">#2C2C28</div></div></div>
  <div class="swatch"><div class="color-block" style="background:#1A1A18"></div><div class="info"><div class="name">Charcoal</div><div class="token">--color-charcoal</div><div class="hex">#1A1A18</div></div></div>
</div>
</body></html>
