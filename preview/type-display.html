<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F5F0E8; padding: 24px 28px; }
.specimen { margin-bottom: 18px; border-bottom: 1px solid #E2D9C5; padding-bottom: 18px; display: flex; align-items: baseline; justify-content: space-between; gap: 16px; }
.specimen:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.text { color: #1A1A18; }
.meta { font-family: 'DM Sans', sans-serif; font-size: 10px; color: #7A7870; white-space: nowrap; text-align: right; line-height: 1.5; }
</style></head>
<body>
  <div class="specimen">
    <div class="text" style="font-family:'Cormorant Garamond',serif;font-size:56px;font-weight:300;letter-spacing:-0.02em;line-height:1">From Garden</div>
    <div class="meta">Display XL / 300<br>−0.02em tracking</div>
  </div>
  <div class="specimen">
    <div class="text" style="font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:400;letter-spacing:-0.02em;line-height:1.15">Von Kaiser Farms</div>
    <div class="meta">Display LG / 400<br>H1</div>
  </div>
  <div class="specimen">
    <div class="text" style="font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:400;letter-spacing:-0.02em;line-height:1.3">Grown with precision</div>
    <div class="meta">Display MD / 400<br>H2</div>
  </div>
  <div class="specimen">
    <div class="text" style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;line-height:1.3">Hydroponic Tower Systems</div>
    <div class="meta">Display SM / 500<br>H3</div>
  </div>
  <div class="specimen">
    <div class="text" style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;font-style:italic;line-height:1.3;color:#1C3829">"From our towers to your table."</div>
    <div class="meta">Pullquote / 300i<br>Display XS</div>
  </div>
</body></html>
