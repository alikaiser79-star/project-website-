<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #F5F0E8; padding: 24px 28px; }
.pair { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.box { padding: 20px; background: white; border: 1px solid #E2D9C5; border-radius: 4px; }
.tag { font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #7A9E87; margin-bottom: 8px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; color: #1A1A18; letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 12px; }
p { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 400; color: #2C2C28; line-height: 1.7; }
.dark { background: #1C3829; border-color: #2E5339; }
.dark .tag { color: #7A9E87; }
.dark h1 { color: #F5F0E8; }
.dark p { color: #B4CCBA; }
</style></head>
<body>
<div class="pair">
  <div class="box">
    <div class="tag">Fresh This Week</div>
    <h1>Crisp Romaine, Baby Arugula</h1>
    <p>Grown in our hydroponic towers over 28 days — harvested this morning, delivered by noon.</p>
  </div>
  <div class="box dark">
    <div class="tag">The Journey</div>
    <h1>From Tower to Table</h1>
    <p>Every crop has a story. We document each stage — from seed placement to your kitchen.</p>
  </div>
</div>
</body></html>
