<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #EDE6D6; padding: 24px 28px; font-family: 'DM Sans', sans-serif; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.box { padding: 28px 32px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
.box-light { background: #F5F0E8; border: 1px solid #D8D0C0; }
.box-dark { background: #1C3829; }
.box-parchment { background: #EDE6D6; border: 1px solid #D8D0C0; }
img { max-width: 100%; height: 56px; }
</style></head>
<body>
<div class="grid">
  <div class="box box-light"><img src="../assets/logo.svg" alt="Von Kaiser Farms"></div>
  <div class="box box-dark"><img src="../assets/logo-light.svg" alt="Von Kaiser Farms (light)"></div>
</div>
</body></html>
