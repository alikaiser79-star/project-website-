<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1C3829; padding: 32px 36px; font-family: 'DM Sans', sans-serif; }
.label { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #7A9E87; margin-bottom: 10px; }
blockquote { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300; font-style: italic; color: #F5F0E8; line-height: 1.3; letter-spacing: -0.01em; margin-bottom: 18px; }
.attribution { display: flex; align-items: center; gap: 12px; }
.attr-line { width: 28px; height: 1px; background: #7A9E87; }
.attr-text { font-size: 12px; font-weight: 500; letter-spacing: 0.08em; color: #7A9E87; text-transform: uppercase; }
</style></head>
<body>
  <div class="label">Brand Voice</div>
  <blockquote>"Grown with German precision.<br>Nourished by Egyptian sun."</blockquote>
  <div class="attribution">
    <div class="attr-line"></div>
    <div class="attr-text">Von Kaiser Farms, Cairo</div>
  </div>
</body></html>
