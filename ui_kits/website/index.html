<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Von Kaiser Farms — Website UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; }
  body { background: #F5F0E8; font-family: 'DM Sans', sans-serif; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="HomePage.jsx"></script>
<script type="text/babel" src="ProduceScreens.jsx"></script>
<script type="text/babel" src="JournalScreens.jsx"></script>

<script type="text/babel">
const PAGES = {
  farm: 'farm',
  produce: 'produce',
  product: 'product',
  journal: 'journal',
  story: 'story',
};

const App = () => {
  const stored = (() => { try { return localStorage.getItem('vkf-page') || 'farm'; } catch(e) { return 'farm'; } })();
  const [page, setPageRaw] = React.useState(stored);

  const setPage = (p) => {
    setPageRaw(p);
    try { localStorage.setItem('vkf-page', p); } catch(e) {}
    window.scrollTo(0, 0);
  };

  const renderPage = () => {
    switch(page) {
      case 'produce': return <ProducePage onNav={setPage} />;
      case 'product': return <ProductDetailPage onNav={setPage} />;
      case 'journal': return <JournalPage onNav={setPage} />;
      case 'story':   return <StoryPage onNav={setPage} />;
      default:        return <HomePage onNav={setPage} />;
    }
  };

  const navMap = { farm: 'farm', produce: 'produce', product: 'produce', journal: 'journal', story: 'story' };
  const navDark = page === 'farm';

  return (
    <div>
      <VKNav dark={navDark} activePage={navMap[page] || page} onNav={setPage} />
      {renderPage()}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
